events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 🆕 Add these 4 lines for big improvements
    gzip on;                          # Compress responses (faster loading)
    gzip_types text/css application/javascript;
    sendfile on;                      # Faster file serving
    keepalive_timeout 65;             # Reuse connections
    
    # 🆕 Security (add these)
    server_tokens off;                               # Hide nginx version
    client_max_body_size 10M;                        # Limit upload size


    server {
        listen 80;
        server_name localhost;
        
        # 🆕 Basic security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://api-service:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # 🆕 Add timeout protection
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}